name: ai_study_companion
description: "AI Study Companion - Your intelligent study partner"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  go_router: ^14.8.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  image_picker: ^1.1.2

  # Phase 2 — Backend & API
  sqflite: ^2.4.2
  path: ^1.9.1
  shared_preferences: ^2.3.5
  file_picker: ^8.3.7
  path_provider: ^2.1.5
  syncfusion_flutter_pdf: ^29.1.38
  google_generative_ai: ^0.4.0
  flutter_dotenv: ^5.2.1

  # Phase 3 — Firebase & PowerPoint support
  firebase_core: ^3.10.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  archive: ^3.6.1
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
